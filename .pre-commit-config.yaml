repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
  - repo: local
    hooks:
      - id: validate-icons
        name: Validate icons
        entry: pdm run validate-icons
        language: system
        files: ^(icons/|icon_scripts/validate/|icon_scripts/icon_to_nbgl/)
        pass_filenames: false
        stages: [pre-commit]
